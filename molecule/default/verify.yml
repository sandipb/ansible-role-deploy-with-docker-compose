---
# Purpose: assert that the instance really ended up in the expected state.
# Molecule calls this playbook with `molecule verify`.
- name: Verify
  hosts: instance
  gather_facts: false

  vars_files:
    - vars/all.yml

  vars:
    expected_service_directories:
      data: "0770"
      cache: "0755"
      config: "0755"
      config/nginx: "0770"
      config/nginx/conf.d: "0770"
    docker_service_templates_expected_lines:
      config/nginx/conf.d/default.conf: >-
        server_name {{ docker_service_templates_vars.server_name }};

  tasks:
    - name: Service directory exists
      block:
        - name: Stat service directory
          ansible.builtin.stat:
            path: "{{ docker_services_root_dir }}/{{ docker_service_name }}"
          register: stat

        - name: Assert service directory creation
          ansible.builtin.assert:
            that:
              - stat.stat.exists
              - stat.stat.isdir
              - stat.stat.pw_name == docker_service_user_name
              - stat.stat.gr_name == docker_service_group_name
              - stat.stat.mode == docker_service_dir_mode

    - name: Service subdirectories exist as expected
      block:
        - name: Stat service subdirectories
          ansible.builtin.stat:
            path: "{{ docker_services_root_dir }}/{{ docker_service_name }}/{{ item.key }}"
          register: service_directory_stats
          loop: "{{ expected_service_directories | dict2items }}"
          loop_control:
            label: "{{ item.key }}"

        - name: Assert service subdirectory properties
          ansible.builtin.assert:
            that:
              - item.stat.exists
              - item.stat.isdir
              - item.stat.pw_name == docker_service_user_name
              - item.stat.gr_name == docker_service_group_name
              - item.stat.mode == item.item.value
          loop: "{{ service_directory_stats.results }}"
          loop_control:
            label: "{{ item.item.key }}"

    - name: Docker Compose file exists
      block:
        - name: Stat Docker Compose file
          ansible.builtin.stat:
            path: "{{ docker_services_root_dir }}/{{ docker_service_name }}/docker-compose.yml"
          register: stat

        - name: Assert Docker Compose file creation
          ansible.builtin.assert:
            that:
              - stat.stat.exists
              - stat.stat.isreg
              - stat.stat.pw_name == docker_service_user_name
              - stat.stat.gr_name == docker_service_group_name
              - stat.stat.mode == docker_service_file_mode

    - name: Docker Compose file contains the correct content
      block:
        - name: Read Docker Compose file
          ansible.builtin.slurp:
            src: "{{ docker_services_root_dir }}/{{ docker_service_name }}/docker-compose.yml"
          register: docker_compose_file_b64

        - name: Decode Docker Compose file
          ansible.builtin.set_fact:
            docker_compose_file: "{{ docker_compose_file_b64.content | b64decode | from_yaml }}"

        - name: Assert Docker Compose file content
          ansible.builtin.assert:
            that:
              - docker_compose_file.services.nginx.image == ("nginx:" + docker_compose_template_vars.nginx_version)
              - docker_compose_file.services.nginx.volumes[0] == "./config/nginx/conf.d:/etc/nginx/conf.d"

    - name: Requested files copied
      when: docker_service_copy_files | length > 0
      block:
        - name: Stat copied files
          ansible.builtin.stat:
            path: "{{ docker_services_root_dir }}/{{ docker_service_name }}/{{ item.value }}"
          register: copied_file_stats
          loop: "{{ docker_service_copy_files | dict2items }}"
          loop_control:
            label: "{{ item.value }}"

        - name: Assert copied file properties
          ansible.builtin.assert:
            that:
              - item.stat.exists
              - item.stat.isreg
              - item.stat.pw_name == docker_service_user_name
              - item.stat.gr_name == docker_service_group_name
              - item.stat.mode == docker_service_file_mode
          loop: "{{ copied_file_stats.results }}"
          loop_control:
            label: "{{ item.item.value }}"

    - name: Requested templates rendered
      when: docker_service_templates | length > 0
      block:
        - name: Stat rendered templates
          ansible.builtin.stat:
            path: "{{ docker_services_root_dir }}/{{ docker_service_name }}/{{ item.value }}"
          register: rendered_template_stats
          loop: "{{ docker_service_templates | dict2items }}"
          loop_control:
            label: "{{ item.value }}"

        - name: Assert rendered template properties
          ansible.builtin.assert:
            that:
              - item.stat.exists
              - item.stat.isreg
              - item.stat.pw_name == docker_service_user_name
              - item.stat.gr_name == docker_service_group_name
              - item.stat.mode == docker_service_file_mode
          loop: "{{ rendered_template_stats.results }}"
          loop_control:
            label: "{{ item.item.value }}"

        - name: Read rendered templates
          ansible.builtin.slurp:
            src: "{{ docker_services_root_dir }}/{{ docker_service_name }}/{{ item.value }}"
          register: rendered_template_contents
          loop: "{{ docker_service_templates | dict2items }}"
          loop_control:
            label: "{{ item.value }}"

        - name: Assert rendered template content
          vars:
            decoded_content: "{{ item.content | b64decode }}"
            expected_line: "{{ docker_service_templates_expected_lines[item.item.value] }}"
          ansible.builtin.assert:
            that:
              - expected_line in decoded_content
            fail_msg: |
              Expected to find '{{ expected_line }}' in {{ item.item.value }}, but it was missing.
          loop: "{{ rendered_template_contents.results }}"
          loop_control:
            label: "{{ item.item.value }}"

    - name: Test http://localhost with Host header "app.example.com"
      ansible.builtin.uri:
        url: http://localhost
        headers:
          Host: app.example.com
        return_content: false
        status_code: 200
      register: app_http_result
      retries: 5
      delay: 1
      until: app_http_result.status == 200

    - name: Test http://localhost returns 404
      ansible.builtin.uri:
        url: http://localhost
        return_content: false
        status_code: 404
